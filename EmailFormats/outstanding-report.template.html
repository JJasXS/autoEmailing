<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outstanding report</title>
</head>
<body style="margin:0;padding:0;background-color:#eef1f4;font-family:'Segoe UI',Arial,sans-serif;font-size:14px;color:#1a1a1a;">
  <!-- Email-safe: table layout + inline styles. Replace {{Tokens}} from code (OutstandingReportEmailTemplate.Apply). -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#eef1f4;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="640" style="max-width:640px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #d9dee3;">
          <tr>
            <td style="padding:20px 24px;background-color:#1a365d;color:#ffffff;">
              <p style="margin:0;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.9;">SQL Accounting</p>
              <h1 style="margin:6px 0 0;font-size:20px;font-weight:600;line-height:1.25;">{{ReportTitle}}</h1>
              <p style="margin:8px 0 0;font-size:13px;opacity:0.95;">{{CompanyName}} · As of {{ReportAsOf}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 24px 8px;">
              <p style="margin:0 0 12px;font-size:14px;line-height:1.5;">{{SalutationLine}}</p>
              <p style="margin:0 0 16px;font-size:13px;line-height:1.5;color:#444;">{{IntroLine}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 16px 8px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;font-size:13px;">
                <thead>
                  <tr>
                    <th align="left" style="padding:10px 8px;border-bottom:2px solid #1a365d;background-color:#f6f8fa;">Document</th>
                    <th align="left" style="padding:10px 8px;border-bottom:2px solid #1a365d;background-color:#f6f8fa;">Date</th>
                    <th align="right" style="padding:10px 8px;border-bottom:2px solid #1a365d;background-color:#f6f8fa;">Age (days)</th>
                    <th align="right" style="padding:10px 8px;border-bottom:2px solid #1a365d;background-color:#f6f8fa;">Outstanding</th>
                  </tr>
                </thead>
                <tbody>
                  {{OutstandingRows}}
                </tbody>
                <tfoot>
                  <tr>
                    <td colspan="3" align="right" style="padding:12px 8px;font-weight:600;border-top:1px solid #e2e6ea;">Total {{Currency}}</td>
                    <td align="right" style="padding:12px 8px;font-weight:600;border-top:1px solid #e2e6ea;">{{GrandTotal}}</td>
                  </tr>
                </tfoot>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 24px 20px;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#5c6570;">{{FooterNote}}</p>
            </td>
          </tr>
        </table>
        <p style="margin:16px 0 0;font-size:11px;color:#7a8490;">This message was generated automatically. Please do not reply.</p>
      </td>
    </tr>
  </table>
</body>
</html>
